name: Build

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller dioui.spec --noconfirm

      - name: Read version
        id: version
        shell: python
        run: |
          import json, os
          v = json.load(open("package.json"))["version"]
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={v}\n")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dioui.exe-v${{ steps.version.outputs.version }}
          path: dist/Dioui.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-tk libfuse2 librsvg2-bin

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller

      - name: Build onedir
        run: pyinstaller dioui-linux.spec --noconfirm

      - name: Read version
        id: version
        run: echo "version=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")" >> $GITHUB_OUTPUT

      - name: Create AppImage
        run: |
          mkdir -p AppDir
          cp -r dist/Dioui/* AppDir/

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/Dioui" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/Dioui.desktop << 'EOF'
          [Desktop Entry]
          Name=Dioui
          Exec=Dioui
          Icon=Dioui
          Type=Application
          Categories=Office;
          EOF

          rsvg-convert -w 256 -h 256 src/assets/dioui.svg -o AppDir/Dioui.png

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --no-appstream AppDir Dioui.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dioui.AppImage-v${{ steps.version.outputs.version }}
          path: Dioui.AppImage

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Dioui v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          body: |
            ### Téléchargements
            - **Windows** : `Dioui.exe`
            - **Linux (Ubuntu)** : `Dioui.AppImage`
          files: |
            artifacts/Dioui.exe-v${{ steps.version.outputs.version }}/Dioui.exe
            artifacts/Dioui.AppImage-v${{ steps.version.outputs.version }}/Dioui.AppImage
          make_latest: true
